<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Executive ROI Analyst with Charts</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #0f172a; --accent: #10b981; --bg: #f8fafc; --secondary: #3b82f6; --border: #e2e8f0; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); padding: 20px; color: var(--primary); }
        .container { max-width: 1000px; margin: 0 auto; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-bottom: 30px; }
        h2 { border-bottom: 2px solid var(--bg); padding-bottom: 15px; margin-top: 0; }
        h3 { color: var(--secondary); font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; margin: 25px 0 10px 0; border-bottom: 1px solid #eee; }
        label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 0.85rem; color: #64748b; }
        input { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; margin-bottom: 15px; box-sizing: border-box; font-size: 1rem; }
       
        .dashboard { background: var(--primary); color: white; padding: 30px; border-radius: 12px; display: grid; grid-template-columns: repeat(3, 1fr); text-align: center; margin-bottom: 30px; }
        .stat-val { display: block; font-size: 2rem; font-weight: 800; color: var(--accent); }
        .stat-label { font-size: 0.75rem; text-transform: uppercase; opacity: 0.7; }

        .chart-container { margin: 30px 0; height: 300px; position: relative; }
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; margin-top: 10px; }
        th { text-align: left; background: #f1f5f9; padding: 10px; border-bottom: 2px solid var(--border); }
        td { padding: 10px; border-bottom: 1px solid var(--border); }
       
        .btn-download { background: var(--secondary); color: white; border: none; padding: 18px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; font-size: 1rem; margin-top: 30px; }
        .neg { color: #ef4444; }
    </style>
</head>
<body>

<div class="container" id="report-content">
    <h2>ROI Analysis: <input type="text" id="clientName" placeholder="Client Name" style="border:none; border-bottom:2px solid var(--secondary); outline:none; font-size:1.5rem; color: var(--primary); width: 300px;"></h2>
   
    <div class="grid">
        <div>
            <h3>Investment</h3>
            <label>Upfront Solution Cost ($)</label>
            <input type="number" id="softwareCost" value="20000" oninput="updateAll()">

            <label>Discount Rate (%)</label>
            <input type="number" id="discountRate" value="10" oninput="updateAll()">
        </div>
        <div>
            <h3>Annual Savings</h3>
            <label>Estimated Labor & Error Savings ($)</label>
            <input type="number" id="annualSavingsInput" value="12000" oninput="updateAll()">
        </div>
    </div>

    <div class="dashboard">
        <div><span class="stat-label">Annual Savings</span><span id="netSavings" class="stat-val">$0</span></div>
        <div><span class="stat-label">3-Year NPV</span><span id="npvFinal" class="stat-val">$0</span></div>
        <div><span class="stat-label">Year 1 ROI</span><span id="roiFinal" class="stat-val">0%</span></div>
    </div>

    <div class="grid">
        <div>
            <h3>Payback Trend</h3>
            <div class="chart-container">
                <canvas id="roiChart"></canvas>
            </div>
        </div>
        <div>
            <h3>Cash Flow Table</h3>
            <table>
                <thead>
                    <tr><th>Year</th><th>Flow</th><th>Cumul. NPV</th></tr>
                </thead>
                <tbody id="cashflow-table"></tbody>
            </table>
        </div>
    </div>

    <div class="no-pdf">
        <button class="btn-download" onclick="generatePDF()">Download Executive Business Case</button>
    </div>
</div>

<script>
    let myChart;

    function updateAll() {
        const cost = parseFloat(document.getElementById('softwareCost').value) || 0;
        const savings = parseFloat(document.getElementById('annualSavingsInput').value) || 0;
        const rate = (parseFloat(document.getElementById('discountRate').value) || 0) / 100;

        document.getElementById('netSavings').innerText = '$' + savings.toLocaleString();
        document.getElementById('roiFinal').innerText = cost > 0 ? Math.round((savings / cost) * 100) + '%' : '0%';

        let tableHTML = "";
        let cumulativeNPV = -cost;
        let chartData = [-cost];
       
        // Year 0 row
        tableHTML += `<tr><td>0 (Initial)</td><td class="neg">-$${cost.toLocaleString()}</td><td class="neg">$${Math.round(cumulativeNPV).toLocaleString()}</td></tr>`;

        for (let t = 1; t <= 3; t++) {
            const pv = savings / Math.pow((1 + rate), t);
            cumulativeNPV += pv;
            chartData.push(Math.round(cumulativeNPV));
           
            tableHTML += `<tr>
                <td>Year ${t}</td>
                <td>$${savings.toLocaleString()}</td>
                <td style="font-weight:bold; color:${cumulativeNPV >= 0 ? 'var(--accent)' : '#ef4444'}">$${Math.round(cumulativeNPV).toLocaleString()}</td>
            </tr>`;
        }

        document.getElementById('cashflow-table').innerHTML = tableHTML;
        document.getElementById('npvFinal').innerText = '$' + Math.round(cumulativeNPV).toLocaleString();
       
        updateChart(chartData);
    }

    function updateChart(data) {
        const ctx = document.getElementById('roiChart').getContext('2d');
        if (myChart) myChart.destroy();

        myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['Year 0', 'Year 1', 'Year 2', 'Year 3'],
                datasets: [{
                    label: 'Cumulative NPV ($)',
                    data: data,
                    borderColor: '#10b981',
                    backgroundColor: 'rgba(16, 185, 129, 0.1)',
                    fill: true,
                    tension: 0.3,
                    pointRadius: 6
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: { y: { grid: { color: '#eee' } } }
            }
        });
    }

    function generatePDF() {
        const element = document.getElementById('report-content');
        const client = document.getElementById('clientName').value || 'Client';
        const opt = {
            margin: 5,
            filename: `ROI_Analysis_${client}.pdf`,
            html2canvas: { scale: 2, useCORS: true },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'landscape' } // Landscape fits chart/table better
        };
        document.querySelector('.no-pdf').style.display = 'none';
        html2pdf().set(opt).from(element).save().then(() => {
            document.querySelector('.no-pdf').style.display = 'block';
        });
    }

    updateAll();
</script>

</body>
</html>
